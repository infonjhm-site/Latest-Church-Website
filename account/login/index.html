<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — New Jerusalem</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <header class="navbar elevation-2">
    <div class="nav-container container">
      <a href="../../index.html" class="logo"><img src="../../NJHM_logo.png" alt="New Jerusalem logo" class="site-logo" />
        <span class="logo-text">New Jerusalem</span></a>
    </div>
  </header>

  <main class="container content-section" style="padding-top:110px;">
    <div class="material-card elevation-1 form-container">
      <h1 class="subpage-title">Login</h1>
      <div class="page-figure">
        <img class="page-hero-img" src="https://images.unsplash.com/photo-1505751172876-fa1923c5c528?q=80&w=1200&auto=format&fit=crop&s=yz7" alt="Login" />
      </div>
      <p class="subpage-lead">Sign in to access member-only resources.</p>
      <div class="subpage-content">
      <form id="loginFormLocal">
        <div class="form-group">
          <input id="loginEmailLocal" name="loginEmailLocal" class="form-input" placeholder=" " type="email" required>
          <label for="loginEmailLocal" class="form-label">Email</label>
        </div>
        <div class="form-group">
          <input id="loginPasswordLocal" name="loginPasswordLocal" class="form-input" placeholder=" " type="password" required>
          <label for="loginPasswordLocal" class="form-label">Password</label>
        </div>
        <div>
          <button type="submit" class="btn ripple">Login</button>
        </div>
      </form>
      </div>
      <p style="margin-top:1rem;"><a href="../../index.html" class="btn btn-outline">Back to Home</a></p>
    </div>
  </main>

  <script src="../../script.js" defer></script>
</body>
</html>
