<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password — New Jerusalem</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <header class="navbar elevation-2">
    <div class="nav-container container">
      <a href="../../index.html" class="logo"><img src="../../NJHM_logo.png" alt="New Jerusalem logo" class="site-logo" />
        <span class="logo-text">New Jerusalem</span></a>
    </div>
  </header>

  <main class="container content-section" style="padding-top:110px;">
    <div class="material-card elevation-1 form-container">
      <h1 class="subpage-title">Forgot Password</h1>
      <div class="page-figure">
        <img class="page-hero-img" src="https://images.unsplash.com/photo-1496302662825-2a6fcd2b9e99?q=80&w=1200&auto=format&fit=crop&s=yz8" alt="Reset" />
      </div>
      <p class="subpage-lead">Reset your password — enter your email to receive reset instructions.</p>
      <div class="subpage-content">
      <form id="forgotFormLocal">
        <div class="form-group">
          <input id="forgotEmailLocal" name="forgotEmailLocal" class="form-input" placeholder=" " type="email" required>
          <label for="forgotEmailLocal" class="form-label">Email</label>
        </div>
        <div>
          <button type="submit" class="btn ripple">Send Reset Link</button>
        </div>
      </form>
      </div>
      <p style="margin-top:1rem;"><a href="../../index.html" class="btn btn-outline">Back to Home</a></p>
    </div>
  </main>

  <script src="../../script.js" defer></script>
</body>
</html>
