<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — NJHM</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="navbar scrolled elevation-2" id="navbar">
    <div class="nav-container"><a href="/" class="logo"><img src="/NJHM_logo.png" alt="NJHM logo" class="site-logo" /><span class="logo-text">New Jerusalem Harvest Ministries</span></a>
      <button class="menu-toggle" id="menuToggle"><span class="material-icons">menu</span></button>
      <nav><ul class="nav-links">
          <li><a href="/" class="nav-link">Home</a></li>
          <li class="has-dropdown"><button class="nav-link dropdown-toggle">ACCOUNT</button>
            <ul class="dropdown"><li><a href="/account/register" class="dropdown-item">Register</a></li><li><a href="/account/login" class="dropdown-item">Login</a></li></ul></li>
          <li><a href="/contact" class="nav-link">Contact</a></li>
      </ul></nav></div>
  </header>
  <main style="padding-top: 120px;">
    <section class="container content-section" style="max-width: 500px;">
      <div class="material-card elevation-2" style="padding: 3rem;">
        <h1 class="subpage-title" style="color: var(--primary); text-align: center;">Login</h1>
        <p class="subpage-lead" style="text-align: center;">Welcome back! Please sign in to your account.</p>
        <form id="loginFormLocal" style="margin-top: 2rem;">
            <div class="form-group"><input id="loginEmailLocal" class="form-input" placeholder=" " type="email" required><label class="form-label">Email Address</label></div>
            <div class="form-group"><input id="loginPasswordLocal" class="form-input" placeholder=" " type="password" required><label class="form-label">Password</label></div>
            <button type="submit" class="btn btn-primary ripple" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>
        <div style="margin-top: 2rem; text-align: center;">
            <p>Don't have an account? <a href="/account/register">Register here</a></p>
        </div>
      </div>
    </section>
  </main>
  <script src="/script.js" defer></script>
</body>
</html>
